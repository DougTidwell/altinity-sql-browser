<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>pipeline graph harness</title>
  <!-- the real stylesheet, so the SVG graph is themed/laid out as shipped -->
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    html, body { margin: 0; background: #111; }
    /* .explain-graph-view is height:100%, so the mount host needs a fixed box. */
    #host { width: 900px; height: 560px; }
  </style>
</head>
<body data-theme="dark">
  <div id="host"></div>
  <!-- Mount the real Pipeline renderer. No bundling: the browser resolves the
       /src ESM graph directly (renderExplainGraph → core/dot.js). -->
  <script type="module">
    // dagre is injected (the app.Dagre seam) — load its self-contained ESM build
    // straight from node_modules, served by the e2e static server (repo root).
    import dagre from '/node_modules/@dagrejs/dagre/dist/dagre.esm.js';
    import { renderExplainGraph, openPipelineFullscreen, renderSchemaGraph } from '/src/ui/explain-graph.js';

    const app = { document, Dagre: dagre, actions: { showSchemaGraph() {} } };
    // Render a DOT document exactly as the inline Pipeline result view does.
    window.__renderPipeline = (dotText) => {
      document.getElementById('host').replaceChildren(renderExplainGraph(app, { rawText: dotText }));
    };
    // Open the fullscreen pan/zoom overlay (same call the Expand button makes).
    window.__openFullscreen = (dotText) => openPipelineFullscreen(app, dotText);
    // Render a schema-lineage graph from a {nodes,edges} object.
    window.__renderSchema = (graph) => {
      document.getElementById('host').replaceChildren(renderSchemaGraph(app, { schemaGraph: graph }));
    };
    window.__ready = true;
  </script>
</body>
</html>
